name: tvtv.us
on:
  schedule:
    - cron: '0/1 * * * *'
  workflow_dispatch:
  workflow_call:
    inputs:
      site:
        required: true
        type: string
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
jobs:
  load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v2
        with:
          node-version: '14'
          cache: 'npm'
      - run: npm install
      - name: Run npx epg-grabber
        run: |
          npx epg-grabber --config=./tvtv.us.config.js --channels=./tvtv.us_test.channels.xml --output=./test/tvtv.us.guide.xml --days=3 
          npx epg-grabber --config=./tvtv.us.config.js --channels=./tvtv.us_test.channels.xml --output=./test/tvtv.us.guide.xml.gz --days=3 --gzip

      - name: Commit files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Add changes" -a

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          force_with_lease: true
          branch: gh-pages 
          
      - uses: zwaldowski/git-commit-action@v1
        with:
          working_directory: .

      - name: Push Final Changes
        uses: ad-m/github-push-action@master
        with:
          branch: gh-pages
